{{template "header" .}}

{{template "agentheader" .}}

<div id="default-styled-tab-content" class="grow flex flex-col">
    <input type="hidden" name="csrf" value="{{.csrf}}">
    <input type="hidden" id="appid" value="{{.assistant.AppId}}">
    <input type="hidden" id="assistantid" value="{{.assistant.Id}}">
    <input type="hidden" id="uniqueid" value="{{.assistant.UniqueId}}">
    <input type="hidden" id="sessionid" value="{{.adminchat.SessionId}}">

    <div class="grow flex flex-col initialcontainer" role="tabpanel" aria-labelledby="profile-tab">
        <div class="p-[16px] max-sm:p-[24px_16px] flex flex-col grow">
            <div class="grid place-items-center grow">
                <div class="w-full max-w-[793px] mx-auto">
                    <div class="w-full max-w-[647px] mx-auto mb-[24px] lg:mb-[49px]">
                        <h1
                            class="text-[24px] sm:text-[28px] leading-[34px] font-bold text-[#202732] text-center mb-[24px] lg:mb-[52px]">
                            Welcome,
                            how
                            can i help?</h1>
                        <div
                            class="rounded-[12px] border border-solid border-[#EEEEEE] p-[10px_10px_10px_20px] flex items-center h-[52px] gap-[20px]">
                            <input type="text" placeholder="Ask anything..."
                                class="chatinput text-sm leading-[20px] font-normal placeholder:text-[#3C485E] grow  outline-none">
                            <!-- <textarea name="" id=""
                    class="block w-full resize-none h-[43px] text-base leading-normal outline-none placeholder:text-[#73726B] font-normal"
                    placeholder="Reply..."></textarea> -->
                            <button class="initialsendbtn min-w-[32px] cursor-pointer hover:opacity-90">
                                <img src="/public/img/send.svg" alt="send">
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-[10px] md:gap-[20px]">

                        {{if .SugQuestions}}
                        {{range .SugQuestions}}
                        <a href="javascript:void(0)"
                            class="sugqus block rounded-[12px] md:rounded-[24px] border border-solid border-[#D9D9D9] p-[10px] md:p-[20px] hover:bg-[#4F607D]/2">
                            <div
                                class="rounded-[8px] w-[32px] h-[32px] border border-solid border-[#E5CCEE] flex items-center justify-center bg-white mb-[16px] md:mb-[20px]">
                                <img src="/public/img/ai-think.svg" alt="">
                            </div>

                            <p class="text-[12px] sm:text-[13px] leading-[20px] font-bold text-[#202732] line-clamp-2">
                                {{.}}</p>
                        </a>
                        {{end}}
                        {{end}}
                    </div>
                </div>
            </div>
        </div>
        <p class="text-[13px] font-normal text-[#28303E] flex justify-end pr-[24px] pb-[24px]">Copyright @ 2026 Piccosoft Lab</p>
    </div>

    <!-- Chat Container -->
    <div class="grow flex flex-col hidden chatcontainer" id="styled-profile" role="tabpanel"
        aria-labelledby="profile-tab">
      
        <div class="grow flex flex-col overflow-auto [scrollbar-width:thin] h-[calc(100vh-209px)] pb-[115px]" id="chatScroll">
        <div class="px-[24px] sticky top-0 flex justify-start items-center pt-[16px]">
            <button id="NewsessionBtn"
                class="flex cursor-pointer items-center text-[16px] hover:text-[#704C9B] shadow-[0px_1px_2px_rgba(0,0,0,0.12)] justify-center pr-[14px] pl-[10px]  py-[8px]  text-[#000000] border border-[#E8E8E8] gap-[4px] rounded-md text-sm leading-[17px] font-medium"
                aria-expanded="false">
                <img src="/public/img/plus.svg" alt=""> New Chat</button>
        </div>
            <div class="w-full max-w-[760px] mx-auto p-[16px] " id="chatContainer">               

            </div>


        </div>

        <div class=" fixed w-full bottom-0 bg-white p-[16px_16px_40px_16px]">
            <div class="p-[10px_10px_10px_20px] flex justify-between border border-solid border-[#D7D6D2] rounded-[12px] max-w-[760px] mx-auto">
              <div class=" ">
                <textarea name="" id=""
                    class="w-[550px] pt-[8px] block resize-none h-[43px] text-base leading-normal outline-none placeholder:text-[#73726B] placeholder:mt-[5px] font-normal"
                    placeholder="Ask anything..."></textarea>
                </div>
            
                    <div class="flex items-center">
                  
                        <el-select id="select" name="selected" value="0" class="block pr-[10px]"
                            style="--button-width: 108px;">

                            <button type="button"
                                class="flex gap-[10px] items-center justify-between border border-solid border-[#C1C9D7] bg-[#FBFBFB] w-full cursor-default  rounded-md h-[30px] text-left  p-[0_10px_0_8px] focus:border-[#704C9B] focus-visible:outline-2 cursor-pointer  min-w-[108px]  "
                                id="select-button-0" aria-haspopup="listbox" aria-controls="listbox-1"
                                aria-expanded="false" popovertarget="listbox-1">
                                <el-selectedcontent
                                    class="col-start-1 modelval row-start-1 flex items-center text-[13px] leading-[20px] font-normal text-[#202732]">
                                    <span class=" block  truncate font-normal group-aria-selected/option:font-semibold">
                                        Models
                                    </span>
                                    <span
                                        class="absolute  inset-y-0 right-0 flex items-center pr-4 text-[#704C9B] hover:text-[#704C9B] group-not-aria-selected/option:hidden group-focus/option:text-[#704C9B] in-[el-selectedcontent]:hidden">
                                        ✔
                                    </span>
                                </el-selectedcontent>


                            <div>
                                <img src="/public/img/accordion-arrow-down.svg" alt="" class="w-[8px]">
                            </div>
                        </button>


                        <el-options anchor="bottom start" popover="manual"
                            class="max-h-56 w-(--button-width) overflow-auto rounded-md bg-white py-1 text-[13px] leading-[20px] font-normal text-[#202732] shadow-lg outline-1 outline-black/5 sm:text-sm"
                            id="listbox-1" role="listbox">

                            {{ $index := . }}
                            {{range $i, $module := .modulearr}}
                            <el-option value="{{ $i }}"
                                class="group/option relative block cursor-default py-2 pr-9 pl-3 text-[#202732] text-[13px] leading-[20px] font-normal select-none focus:bg-[#F8ECFE] focus:text-[#202732] cursor-pointer"
                                aria-selected="true" id="item-{{ $i }}" role="option" tabindex="-1">
                                <span class="block  truncate font-normal group-aria-selected/option:font-semibold">
                                    {{ $module }}
                                </span>
                                <span
                                    class="absolute inset-y-0 right-0 flex items-center pr-4 text-[#704C9B] hover:text-[#704C9B] group-not-aria-selected/option:hidden group-focus/option:text-[#704C9B] in-[el-selectedcontent]:hidden">
                                    ✔
                                </span>
                            </el-option>
                            {{end}}



                        </el-options>
                    </el-select>
                    <button class="darkbtn min-w-[32px] cursor-pointer hover:opacity-90">
                        <img src="/public/img/send-dark.svg" alt="">
                    </button>
                <!-- </div> -->
            </div>
        </div>
    </div>
</div>





{{template "footer" .}}

<script src="/public/js/aichat/aichat.js"></script>
