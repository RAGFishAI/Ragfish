


{{template "header" .}}



<div class="p-[32px_16px] xl:p-[35px_24px] min-h-[calc(100dvh-52px)] ">

    <div class="pb-2 max-w-[551px]  w-full m-0 pl-[8px]">
        <div class="mr-auto flex items-center gap-[6px] overflow-hidden ">
            <a href="/settings/myprofile">
                <h2 class="text-[13px] font-normal leading-[20px] text-[#252525] whitespace-nowrap max-sm:text-xs">
                    Profile settings
                </h2>
            </a>
            <img src="/public/img/arrow-right-s-line 1.svg" alt="arrow-category">
            <h2 class="text-[13px] font-medium hover leading-[20px] text-[#252525] whitespace-nowrap max-sm:text-xs">
                Change Email
            </h2>
        </div>
    </div>
    
    
    <div class="h-[596px] flex items-center justify-center">
    <div class="w-full max-w-[551px]">
        

        <form action="/settings/updateemail" method="post" id="change_email_form">
        <h2 class="text-[24px] leading-[20px] font-bold text-[#202732] mb-[40px]">Change Email</h2>

        <div class="grid gap-[12px]">
            <div id="password_div">
                <label class="text-sm leading-[17px] font-semibold text-[#202732] block mb-[8px]">Current
                    password</label>
                <input type="text" placeholder="Current password" id="password"
                    class="border transition-all duration-200 rounded-[8px] border-solid border-[#E0E4EB] h-[40px] block px-[16px] text-sm leading-[19px] font-normal placeholder:text-[#63789C] block w-full hover:outline-[4px] outline-[#f8ecfe] focus: border-[#704C9B]">
            </div>


                   <div id="email_div">
                <label for="email" class="text-sm leading-[17px] font-semibold text-[#202732] block mb-[8px]">New Email
                    ID</label>
                <input type="text" placeholder="Create New Email" id="email" name="email"
                    class="border transition-all duration-200 rounded-[8px] border-solid border-[#E0E4EB] h-[40px] block px-[16px] text-sm leading-[19px] font-normal placeholder:text-[#63789C] block w-full hover:outline-[4px] outline-[#f8ecfe] focus: border-[#704C9B]">           </div>
   
             </div>

        <div class="flex gap-[10px] items-center justify-end mt-[30px]">
            <button id="cancel_button"
                class="bg-[#F3F4F7] h-[40px] !px-[20px] rounded-[8px] text-base leading-[20px] font-medium text-[#202732] max-w-max cursor-pointer hover:border-[#704C9B] border border-solid border-transparent">Cancel</button>
            <button id="update_email_button"
                class="dark-btn h-[40px] !px-[20px] rounded-[8px] text-base leading-[20px] font-medium text-[#FFFFFF] max-w-max cursor-pointer">Update
                </button>
        </div>

        <input type="hidden" id="csrf" class="block w-full  h-[34px] bg-[#F7F7F5] rounded-[4px] p-[8px]" value="{{.csrf}}"
            name='csrf'>
     
        </form>
        
    </div>
    </div>
</div>

{{template "footer" .}}

<script src="/public/js/settings/change_email.js"></script>
